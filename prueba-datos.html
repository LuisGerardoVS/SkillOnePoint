<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Conexión - Tablero</title>
    <style>
        /* 1. Modificamos el contenedor principal de tu página (o el body) 
   para asegurarnos de que el fondo y la página se estiren junto con la tabla */
        body, .contenedor-principal {
            width: min-content;      /* Fuerza a la página a expandirse al ancho real del contenido */
            min-width: 100%;         /* Asegura que nunca sea más pequeña que la pantalla inicial */
            margin: 0 auto;          /* Centra todo el bloque perfectamente */
            padding: 20px;
            box-sizing: border-box;
        }

        /* 2. El contenedor de la tabla se acoplará al tamaño exacto de lo que mida la tabla */
        .contenedor-tabla {
            display: inline-block;   /* Se comporta como bloque pero respeta el tamaño interno */
            width: 100%;
            margin: 20px auto;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        /* 3. La tabla se expande libremente sin restricciones de pantalla */
        table {
            width: max-content;      /* ¡La clave! La tabla medirá exactamente la suma de lo que midan sus títulos */
            min-width: 100%;
            border-collapse: collapse;
            table-layout: auto;      /* El navegador calcula las columnas basándose en el texto más largo */
        }

        /* 4. Obligamos a que cada celda abarque el ancho completo de su título */
        th, td {
            padding: 14px 20px;      /* Espaciado cómodo para que respiren los datos */
            text-align: left;
            white-space: nowrap;     /* ¡Crucial! Prohíbe los saltos de línea. La celda medirá lo que mida el título */
        }

        /* Estilos visuales de los encabezados */
        th {
            background-color: #003366; 
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 3px solid #002244;
        }

        /* Estilos de las celdas de datos */
        td {
            font-size: 15px;
            color: #333333;
            border-bottom: 1px solid #eeeeee;
        }

        /* Opcional: Un efecto cebra para leer mejor las filas largas */
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mi Tablero de Pruebas</h1>
        <p>Leyendo los datos procesados por Power Automate...</p>
        
        <div id="loading">Intentando leer el archivo JSON...</div>

        <div class="contenedor-tabla">
        
        <table id="tabla-datos" style="display: none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre_curso</th>
                    <th>Clave_banner</th>
                    <th>Tipo_solicitud</th>
                    <th>Tipo_producto</th>
                    <th>Cliente_tipo</th>
                    <th>Solicitante</th>
                    <th>Fecha_solicitud</th>
                    <th>Prioridad</th>
                    <th>Estatus_solicitud</th>
                </tr>
            </thead>
            <tbody id="contenedor-filas">
                </tbody>
        </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
